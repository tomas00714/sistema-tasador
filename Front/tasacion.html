<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Tasación</title>

    <script src="https://kit.fontawesome.com/d853729d1d.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/shell.css">
    <link rel="stylesheet" href="css/tasacion.css">

    <script>
        // Aplicar estado del sidebar antes del primer render para evitar salto visual
        (function() {
            const savedState = localStorage.getItem('sidebarCollapsed');
            if (savedState === 'true') {
                document.documentElement.classList.add('sidebar-collapsed-initial');
            }
        })();
    </script>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

</head>
<body>
    <aside class="sidebar" id="sidebar" aria-label="Menú lateral">
        <div class="sidebar-logo">
            <div class="sidebar-logo-img">
                <i class="fa-solid fa-home"></i>
            </div>
            <span class="sidebar-logo-text">Tasador</span>
        </div>

        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Minimizar/expandir menú">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <nav class="sidebar-nav">
            <a href="TASADOR.html" class="sidebar-nav-item" data-page="inicio">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-house"></i>
                </span>
                <span class="sidebar-nav-item-text">Inicio</span>
            </a>

            <a href="historial.html" class="sidebar-nav-item" data-page="historial">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </span>
                <span class="sidebar-nav-item-text">Base de datos</span>
            </a>

            <a href="tasacion.html" class="sidebar-nav-item active" data-page="tasacion">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-plus"></i>
                </span>
                <span class="sidebar-nav-item-text">Nueva tasación</span>
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <button type="button" class="sidebar-profile" aria-label="Perfil de usuario">
            <div class="sidebar-profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="sidebar-profile-info">
                <span class="sidebar-profile-name">Usuario</span>
            </div>
        </button>
    </aside>

    <div class="main-layout" id="mainLayout">
        <div class="main-content" id="mainContent">

    <div class="content-wrapper">

        <div class="nav-pill-container fixed" id="navPillContainer">
            <!-- Progress indicators will be added here dynamically -->
        </div>

        <div class="panel-principal">

            <div class="tasacion-contenido">

            <div class="titulo-seccion">

                <h1>Selección tipo de inmueble</h1>

                <p>
                    Elegí el tipo de propiedad que querés tasar.
                </p>

            </div>

            <div class="grid-tipos">

                <button class="card-tipo" data-tipo="lote">
                    <div class="card-tipo-icono">
                        <i class="fa-solid fa-map-pin"></i>
                    </div>
                    <div class="card-tipo-contenido">
                        <span class="card-tipo-nombre">Lote</span>
                        <span class="card-tipo-descripcion">Terreno sin construcción</span>
                    </div>
                </button>

                <button class="card-tipo" data-tipo="casa">
                    <div class="card-tipo-icono">
                        <i class="fa-regular fa-house"></i>
                    </div>
                    <div class="card-tipo-contenido">
                        <span class="card-tipo-nombre">Casa</span>
                        <span class="card-tipo-descripcion">Vivienda unifamiliar</span>
                    </div>
                </button>

                <button class="card-tipo" data-tipo="departamento">
                    <div class="card-tipo-icono">
                        <i class="fa-regular fa-building"></i>
                    </div>
                    <div class="card-tipo-contenido">
                        <span class="card-tipo-nombre">Departamento / PH</span>
                        <span class="card-tipo-descripcion">Unidad funcional</span>
                    </div>
                </button>

            </div>

        </div>

        </div>

    </div>

    <div class="bottom-nav-bar">

        <button class="btn-volver-paso btn-volver-paso--inicio"
                id="btnVolverPaso"
                disabled>
            Volver
        </button>

        <button class="btn-siguiente"
                id="btnSiguiente"
                disabled>
            Siguiente
        </button>

    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner">
            <div class="spinner"></div>
            <p>Calculando tasación...</p>
        </div>
    </div>

    <!-- Vista ComparableEditor para crear/editar/visualizar comparables -->
    <div class="comparable-editor-container" id="comparableEditorContainer" style="display: none;">
        <div class="comparable-editor" id="comparableEditor">
            <!-- El contenido se renderizará dinámicamente según modo y tipo -->
        </div>
    </div>

    <div class="modal-overlay" id="confirmacionSalirModal">

        <div class="modal-confirmacion-salir">

            <h2>¿Estás seguro de salir?</h2>

            <p>
                Estás en medio de una tasación. Si sales, perderás los datos no guardados.
            </p>

            <div class="modal-confirmacion-botones">

                <button
                    type="button"
                    class="btn-confirmacion-cancelar"
                    id="btnCancelarSalir">
                    Cancelar
                </button>

                <button
                    type="button"
                    class="btn-confirmacion-guardar"
                    id="btnGuardarBorrador">
                    Guardar borrador
                </button>

                <button
                    type="button"
                    class="btn-confirmacion-no-guardar"
                    id="btnNoGuardar">
                    No guardar
                </button>

            </div>

        </div>

    </div>

    <!-- Modal Genérico Reutilizable -->
    <div class="modal-overlay" id="modalGenerico">
        <div class="modal-confirmacion-salir">
            <h2 class="modal-titulo"></h2>
            <p class="modal-mensaje"></p>
            <div class="modal-confirmacion-botones modal-botones"></div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/d853729d1d.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/sidebar.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/entidades.js"></script>
    <script src="js/global.js"></script>
    <script src="js/event-manager.js"></script>
    <script src="js/storage-cache.js"></script>
    <script src="js/html-cache.js"></script>
    <script src="js/ubicacion-utils.js"></script>
    <script src="js/autocomplete-manager.js"></script>
    <script src="js/tasacion-core.js"></script>
    
    <!-- New validation and navigation architecture - load before tasacion-navegacion -->
    <script src="js/validators/validator-base.js"></script>
    <script src="js/validators/lote-validator.js"></script>
    <script src="js/validators/departamento-validator.js"></script>
    <script src="js/validators/casa-validator.js"></script>
    <script src="js/ui/validation-ui.js"></script>
    <script src="js/config/flujo-config.js"></script>
    <script src="js/calculos-coeficientes.js"></script>
    <script src="js/tasacion-navegacion.js"></script>
    <script src="js/tasacion-seleccion-tipo.js"></script>
    <script src="js/tasacion-componentes.js"></script>
    <script src="js/tasacion-ubicacion.js"></script>
    <script src="js/tasacion-datos.js"></script>
    <script src="js/modal-generico.js"></script>
    <script src="js/tasacion-confirmacion.js"></script>
    <script src="js/tasacion-lote.js"></script>
    <script src="js/tasacion-departamento.js"></script>
    <script src="js/tasacion-casa.js"></script>
    <script src="js/comparable-editor.js"></script>
    <script src="js/comparable-formulario.js"></script>
    <script src="js/comparable-modal.js"></script>
    <script src="js/tasacion-comparables.js"></script>
    <script src="js/config/resultados-config.js"></script>
    <script src="js/reactive-coefficients.js"></script>
    <script src="js/resultados-renderer.js"></script>
    <script src="js/tasacion-resultado.js"></script>
    </div>
    </div>
    </div>

</body>
</html>
