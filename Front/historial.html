<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Tasaciones</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/shell.css">
    <link rel="stylesheet" href="css/historial.css">

    <script>
        // Aplicar estado del sidebar antes del primer render para evitar salto visual
        (function() {
            const savedState = localStorage.getItem('sidebarCollapsed');
            if (savedState === 'true') {
                document.documentElement.classList.add('sidebar-collapsed-initial');
            }
        })();
    </script>
</head>
<body>
    <aside class="sidebar" id="sidebar" aria-label="Menú lateral">
        <div class="sidebar-logo">
            <div class="sidebar-logo-img">
                <i class="fa-solid fa-home"></i>
            </div>
            <span class="sidebar-logo-text">Tasador</span>
        </div>

        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Minimizar/expandir menú">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <nav class="sidebar-nav">
            <a href="TASADOR.html" class="sidebar-nav-item" data-page="inicio">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-house"></i>
                </span>
                <span class="sidebar-nav-item-text">Inicio</span>
            </a>

            <a href="historial.html" class="sidebar-nav-item active" data-page="historial">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-clock-rotate-left"></i>
                </span>
                <span class="sidebar-nav-item-text">Base de datos</span>
            </a>

            <a href="tasacion.html" class="sidebar-nav-item" data-page="tasacion">
                <span class="sidebar-nav-item-icon">
                    <i class="fa-solid fa-plus"></i>
                </span>
                <span class="sidebar-nav-item-text">Nueva tasación</span>
            </a>
        </nav>

        <div class="sidebar-divider"></div>

        <button type="button" class="sidebar-profile" aria-label="Perfil de usuario">
            <div class="sidebar-profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <div class="sidebar-profile-info">
                <span class="sidebar-profile-name">Usuario</span>
            </div>
        </button>
    </aside>

    <div class="main-layout" id="mainLayout">
        <div class="main-content" id="mainContent">

    <section class="historial-section" aria-label="Historial">

        <div class="historial-container">

            <div class="historial-content">

                <div class="historial-panel-izquierdo">

                    <div class="historial-header">

                        <input
                            type="text"
                            placeholder="Dirección o código de propiedad"
                            class="input-busqueda">

                        <div class="tabs-container" role="tablist" aria-label="Estado de las tasaciones">
                            <button type="button" class="btn-tab active" data-tab="todas">Todas</button>
                            <button type="button" class="btn-tab" data-tab="completadas">Completadas</button>
                            <button type="button" class="btn-tab" data-tab="borradores">Borradores</button>
                        </div>

                        <div class="filtros-tipo" role="group" aria-label="Filtrar por tipo de inmueble">
                            <button type="button" class="btn-filtro-tipo active" data-tipo-filtro="todos">Todos</button>
                            <button type="button" class="btn-filtro-tipo" data-tipo-filtro="lote">Lote</button>
                            <button type="button" class="btn-filtro-tipo" data-tipo-filtro="ph">PH</button>
                            <button type="button" class="btn-filtro-tipo" data-tipo-filtro="casa">Casa</button>
                        </div>

                    </div>

                    <div class="lista-propiedades"></div>

                </div>

                <div class="historial-panel-derecho">
                    <div id="map"></div>
                </div>

            </div>

        </div>

    </section>
    </div>
    </div>

    <div class="modal-overlay" id="comparablesModalOverlay">

        <div class="modal-tasacion" id="comparablesModalTasacion">

            <button
                type="button"
                class="cerrar-modal"
                id="comparablesModalCerrar"
                aria-label="Cerrar">
                ✕
            </button>

            <div id="comparablesModalContenido"></div>

        </div>

    </div>

    <div class="modal-overlay" id="modalOverlay">

        <div class="modal-tasacion" id="modalTasacion">

            <button
                type="button"
                class="cerrar-modal"
                id="cerrarModal"
                aria-label="Cerrar">
                ✕
            </button>

            <div id="contenidoModal"></div>

        </div>

    </div>

    <!-- Modal Genérico Reutilizable -->
    <div class="modal-overlay" id="modalGenerico">
        <div class="modal-confirmacion-salir">
            <h2 class="modal-titulo"></h2>
            <p class="modal-mensaje"></p>
            <div class="modal-confirmacion-botones modal-botones"></div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/d853729d1d.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/sidebar.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/entidades.js"></script>
    <script src="js/global.js"></script>
    <script src="js/storage-cache.js"></script>
    <script src="js/modal-generico.js"></script>
    <script src="js/historial.js"></script>

</body>
</html>
