<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Tasaciones</title>

    <script src="https://kit.fontawesome.com/d853729d1d.js" crossorigin="anonymous"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/shell.css">
    <link rel="stylesheet" href="css/historial.css">
</head>
<body>

    <nav class="top-nav-bar" aria-label="Menú principal">

        <div class="nav-section-left">
            <div class="logo-placeholder">
                <!-- Logo placeholder -->
            </div>
            <button
                type="button"
                class="nav-btn dark-mode-toggle"
                id="darkModeToggle"
                aria-label="Cambiar modo oscuro"
                title="Cambiar modo oscuro">
                <i class="fa-solid fa-sun"></i>
            </button>
        </div>

        <div class="nav-section-middle" id="progressSection">
            <!-- Progress indicators will be added here dynamically -->
        </div>

        <div class="nav-section-right">
            <button
                type="button"
                class="nav-btn"
                onclick="window.location.href='TASADOR.html'">
                <i class="fa-solid fa-house"></i>
            </button>

            <button
                type="button"
                class="nav-btn active">
                <i class="fa-solid fa-clock-rotate-left"></i>
            </button>

            <button
                type="button"
                class="nav-btn"
                onclick="window.location.href='tasacion.html'">
                <i class="fa-solid fa-plus"></i>
            </button>

            <button
                type="button"
                class="profile-btn"
                aria-label="Perfil de usuario"
                title="Perfil">

                <span class="profile-avatar" aria-hidden="true">
                    <i class="fa-solid fa-user"></i>
                </span>

            </button>
        </div>

    </nav>

    <section class="historial-section" aria-label="Historial">

        <div class="historial-container">

            <div class="historial-header">

                <input
                    type="text"
                    placeholder="Dirección o código de propiedad"
                    class="input-busqueda">

                <div class="tabs-container">
                    <button type="button" class="btn-tab active" data-tab="todas">Todas</button>
                    <button type="button" class="btn-tab" data-tab="completadas">Completadas</button>
                    <button type="button" class="btn-tab" data-tab="borradores">Borradores</button>
                </div>

            </div>

            <div class="historial-content">

                <div class="lista-propiedades"></div>

                <div id="map"></div>

            </div>

        </div>

    </section>

    <div class="modal-overlay" id="comparablesModalOverlay">

        <div class="modal-tasacion" id="comparablesModalTasacion">

            <button
                type="button"
                class="cerrar-modal"
                id="comparablesModalCerrar"
                aria-label="Cerrar">
                ✕
            </button>

            <div id="comparablesModalContenido"></div>

        </div>

    </div>

    <div class="modal-overlay" id="modalOverlay">

        <div class="modal-tasacion" id="modalTasacion">

            <button
                type="button"
                class="cerrar-modal"
                id="cerrarModal"
                aria-label="Cerrar">
                ✕
            </button>

            <div id="contenidoModal"></div>

        </div>

    </div>

    <div class="top-barra-fondo"></div>

    <script src="js/global.js"></script>
    <script src="js/historial.js"></script>

</body>
</html>
